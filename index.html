<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md. Akash | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
  scroll-behavior:smooth;
}

body{
  background:#0f172a;
  color:white;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  gap:25px;
  padding:15px;
  z-index:1000;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:600;
}

nav a:hover{
  color:#38bdf8;
}

/* HERO */
header{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle,#1e293b,#0f172a);
}

.hero h1{
  font-size:55px;
  color:#38bdf8;
}

/* PROFILE WITH GLOW FIX */
.profile{
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #38bdf8;

  /* ✨ GLOW EFFECT FIXED */
  box-shadow: 0 0 15px #38bdf8,
              0 0 30px rgba(56,189,248,0.6),
              0 0 45px rgba(56,189,248,0.3);

  animation: glow 2s infinite ease-in-out;
}

/* ANIMATION */
@keyframes glow {
  0% { box-shadow:0 0 10px #38bdf8,0 0 20px rgba(56,189,248,0.3); }
  50% { box-shadow:0 0 25px #38bdf8,0 0 50px rgba(56,189,248,0.6); }
  100% { box-shadow:0 0 10px #38bdf8,0 0 20px rgba(56,189,248,0.3); }
}

/* SECTION */
section{
  padding:90px 20px;
  max-width:1100px;
  margin:auto;
}

.section-title{
  text-align:center;
  font-size:34px;
  color:#38bdf8;
  margin-bottom:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:30px 20px;
  border-radius:18px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #38bdf8;
}

.skill-icon{
  font-size:50px;
  color:#38bdf8;
  margin-bottom:15px;
}

/* CONTACT */
.contact-container{
  background:#1e293b;
  padding:35px;
  border-radius:18px;
  max-width:600px;
  margin:auto;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

footer{
  text-align:center;
  padding:30px;
  color:#64748b;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{
    font-size:38px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#home">Home</a>
  <a href="#skills">Skills</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<header id="home">
  <div class="hero">
    <img src="akash.jpg" class="profile">
    <h1>Md. Akash</h1>
    <p style="color:#94a3b8;">Software Engineering Student</p>
  </div>
</header>

<!-- SKILLS -->
<section id="skills">
  <h2 class="section-title">Skills</h2>

  <div class="grid">

    <div class="card">
      <i class="fas fa-code skill-icon"></i>
      <h3>C</h3>
    </div>

    <div class="card">
      <i class="fab fa-java skill-icon"></i>
      <h3>Java</h3>
    </div>

    <div class="card">
      <i class="fab fa-python skill-icon"></i>
      <h3>Python</h3>
    </div>

    <div class="card">
      <i class="fas fa-mobile-alt skill-icon"></i>
      <h3>Flutter</h3>
    </div>

    <div class="card">
      <i class="fas fa-database skill-icon"></i>
      <h3>MySQL</h3>
    </div>

  </div>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2 class="section-title">Projects</h2>

  <div class="grid">

    <div class="card">
      <i class="fas fa-utensils skill-icon"></i>
      <h3>Food Order Website</h3>
      <p>HTML & CSS based website</p>
    </div>

    <div class="card">
      <i class="fas fa-shopping-cart skill-icon"></i>
      <h3>Grocery App</h3>
      <p>Flutter Mobile App</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2 class="section-title">Contact</h2>

  <div class="contact-container">
    <form action="https://formspree.io/f/xeenrepe" method="POST">
      <input type="text" name="name" placeholder="Your Name">
      <input type="email" name="email" placeholder="Your Email">
      <textarea name="message" rows="5" placeholder="Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </div>
</section>

<footer>
  © 2026 Md. Akash | All Rights Reserved
</footer>

</body>
</html>
